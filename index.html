<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda TESE - Proyecto Final 35 Productos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    
    <style>
        .bg-tese { background-color: #1c2127 !important; }
        .card-img-top { height: 160px; object-fit: cover; background: #eee; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        body { padding-bottom: 50px; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
    </style>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wbei7avd12");
    </script>
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-tese sticky-top shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">🛒 TIENDA TESE</span>
            <button class="btn btn-warning fw-bold" data-bs-toggle="offcanvas" data-bs-target="#cartSide">
                <i class="bi-cart-fill"></i> <span id="cart-badge" class="badge bg-danger rounded-pill">0</span>
            </button>
        </div>
    </nav>

    <div class="container py-4 text-center">
        <h2 class="fw-bold">Ingeniería en Sistemas Computacionales</h2>
        <p class="text-muted small">Telemetría de Ventas - Equipo TESE 2026</p>
        <hr>
        
        <div class="row row-cols-1 row-cols-md-3 row-cols-xl-5 g-3" id="grid"></div>
    </div>

    <div class="offcanvas offcanvas-end" id="cartSide">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="m-0">Resumen de Compra</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="list"></div>
            <hr>
            <div class="d-flex justify-content-between mb-3">
                <h5>Total:</h5>
                <h5 id="total">$0</h5>
            </div>
            <button class="btn btn-success w-100 fw-bold py-3" onclick="pagar()">
                <i class="bi-credit-card-2-front"></i> FINALIZAR Y PAGAR
            </button>
            <p class="text-muted x-small mt-3 text-center" style="font-size: 0.7rem;">
                Al pagar, se sincronizará la telemetría automáticamente.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // CATÁLOGO DE 35 PRODUCTOS CON IMÁGENES REVISADAS
        const products = [
            // Laptops y Estaciones
            {n:"Laptop Gamer RTX 4060", p:24500, i:"https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400"},
            {n:"MacBook Pro M2", p:32000, i:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400"},
            {n:"PC Armada Ryzen 9", p:28900, i:"https://images.unsplash.com/photo-1587202372634-32705e3bf49c?w=400"},
            {n:"Laptop HP Pavilion", p:11500, i:"https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400"},
            {n:"Workstation Dell", p:45000, i:"https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=400"},
            
            // Periféricos
            {n:"Monitor 4K UltraWide", p:8900, i:"https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400"},
            {n:"Teclado Mecánico RGB", p:1850, i:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400"},
            {n:"Mouse Inalámbrico G Pro", p:1200, i:"https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400"},
            {n:"Audífonos Hi-Fi Studio", p:3400, i:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
            {n:"Cámara de Seguridad IP", p:1450, i:"https://images.unsplash.com/photo-1557862921-37829c790f19?w=400"},
            
            // Componentes
            {n:"Tarjeta RTX 4070 Ti", p:15600, i:"https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400"},
            {n:"Procesador Intel i9", p:9200, i:"https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?w=400"},
            {n:"RAM 32GB DDR5", p:2800, i:"https://images.unsplash.com/photo-1562976540-1502c2145186?w=400"},
            {n:"SSD NVMe 2TB Gen4", p:3100, i:"https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?w=400"},
            {n:"Fuente 850W Gold", p:2400, i:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400"},
            
            // Redes e Infraestructura
            {n:"Router WiFi 6 Mesh", p:4200, i:"https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=400"},
            {n:"Switch Administrable 24P", p:6500, i:"https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=400"},
            {n:"Servidor NAS 8TB", p:12500, i:"https://images.unsplash.com/photo-1518770660439-4636190af475?w=400"},
            {n:"Antena Ubiquiti AC", p:2900, i:"https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=400"}, // Imagen Corregida
            {n:"Bobina Cat6 305m", p:2100, i:"https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=400"},
            
            // Gadgets y Smart Home
            {n:"Kit Limpieza Electrónica", p:350, i:"https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400"}, // Imagen Corregida
            {n:"Bocina Echo Dot 5", p:1100, i:"https://images.unsplash.com/photo-1543512214-318c7553f230?w=400"},
            {n:"Lámpara Escritorio LED", p:850, i:"https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=400"},
            {n:"Enchufe Smart WiFi", p:450, i:"https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=400"},
            {n:"Reloj Inteligente Pro", p:3200, i:"https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?w=400"},
            
            // Accesorios
            {n:"Silla Gamer Elite", p:4800, i:"https://images.unsplash.com/photo-1598550476439-6847785fcea6?w=400"},
            {n:"Mochila Antirrobo 17\"", p:1200, i:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400"},
            {n:"Mousepad XXL Negro", p:450, i:"https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=400"},
            {n:"Soporte Monitor Dual", p:1600, i:"https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400"},
            {n:"Disco Externo 4TB", p:2200, i:"https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=400"},
            
            // Más Accesorios y Herramientas (31-35)
            {n:"No-Break 1500VA", p:3800, i:"https://images.unsplash.com/photo-1555680202-c86f0e12f086?w=400"},
            {n:"Hub USB-C 10 en 1", p:1100, i:"https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=400"},
            {n:"Kit de Herramientas PC", p:750, i:"https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=400"},
            {n:"Enfriamiento Líquido", p:2600, i:"https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400"},
            {n:"Impresora Láser Color", p:5400, i:"https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400"}
        ];

        const gal = document.getElementById('grid');
        products.forEach(p => {
            gal.innerHTML += `
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <img src="${p.i}" class="card-img-top" loading="lazy">
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <h6 style="font-size: 0.85rem;">${p.n}</h6>
                            <p class="text-primary fw-bold mb-2">$${p.p.toLocaleString()}</p>
                        </div>
                        <button class="btn btn-dark btn-sm w-100" onclick="add('${p.n}', ${p.p})">
                            Agregar
                        </button>
                    </div>
                </div>
            </div>`;
        });

        let cart = [];

        function add(n, p) { 
            cart.push({n, p}); 
            ui(); 
            send('Agregó: ' + n); 
        }

        function remove(index, nombre) {
            cart.splice(index, 1);
            ui();
            send('Eliminó: ' + nombre);
        }

        function pagar() {
            if(cart.length === 0) return alert("El carrito está vacío");
            send('Clic: Pagar - Total: ' + document.getElementById('total').innerText);
            alert("¡Simulación de Pago Exitosa! Sincronizando con Microsoft Clarity...");
            
            // RECARGA PARA GUARDADO DE SESIÓN (Forzamos el guardado de video en Clarity)
            setTimeout(() => {
                window.location.reload(); 
            }, 1500);
        }
        
        function ui() {
            const list = document.getElementById('list');
            document.getElementById('cart-badge').innerText = cart.length;
            list.innerHTML = ''; 
            let s = 0;
            cart.forEach((p, index) => { 
                s += p.p; 
                list.innerHTML += `
                    <div class="cart-item">
                        <span style="font-size: 0.8rem;"><b>${p.n}</b> - $${p.p.toLocaleString()}</span>
                        <button class="btn btn-outline-danger btn-sm" onclick="remove(${index}, '${p.n}')">
                            <i class="bi-trash"></i>
                        </button>
                    </div>`; 
            });
            document.getElementById('total').innerText = '$' + s.toLocaleString();
        }

        document.addEventListener('click', (e) => {
            let texto = e.target.innerText;
            if (texto && !e.target.closest('.offcanvas')) {
                send(texto.substring(0, 30)); 
            }
        });

        function send(elemento) {
            fetch('https://telemetria-tese.onrender.com/recibir-clic', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    x: 0, y: 0, 
                    pagina: "Tienda-Master-Jose", 
                    elemento_clic: elemento 
                })
            }).catch(() => {}); 
        }
    </script>
</body>
</html>
