<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda TESE - Equipo Jose</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    
    <style>
        .bg-tese { background-color: #1c2127 !important; }
        .card-img-top { height: 180px; object-fit: cover; background: #eee; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
    </style>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wbei7avd12");
    </script>
    </head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-tese sticky-top shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">🛒 TIENDA TESE</span>
            <button class="btn btn-warning fw-bold" data-bs-toggle="offcanvas" data-bs-target="#cartSide">
                <i class="bi-cart-fill"></i> <span id="cart-badge" class="badge bg-danger rounded-pill">0</span>
            </button>
        </div>
    </nav>

    <div class="container py-4 text-center">
        <h2 class="fw-bold">Ingeniería en Sistemas Computacionales</h2>
        <p class="text-muted small">Telemetría de Ventas - Proyecto 2026</p>
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-4" id="grid"></div>
    </div>

    <div class="offcanvas offcanvas-end" id="cartSide">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="m-0">Tu Carrito</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="list"></div>
            <hr>
            <h5>Total: <span id="total">$0</span></h5>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 1. Catálogo de Productos
        const products = [
            {n:"Laptop Gamer Pro", p:24500, i:"https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400"},
            {n:"Audífonos Bluetooth", p:3200, i:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
            {n:"Mouse Inalámbrico", p:850, i:"https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400"},
            {n:"Teclado RGB", p:1800, i:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400"},
            {n:"Webcam HD 1080p", p:1100, i:"https://images.unsplash.com/photo-1612450792842-8c909c25679f?w=400"},
            {n:"Lámpara LED Inteligente", p:780, i:"https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=400"}
        ];

        // 2. Mostrar los productos en la pantalla
        const gal = document.getElementById('grid');
        products.forEach(p => {
            gal.innerHTML += `
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <img src="${p.i}" class="card-img-top" alt="${p.n}">
                    <div class="card-body text-center">
                        <h6>${p.n}</h6>
                        <p class="text-primary fw-bold">$${p.p.toLocaleString()}</p>
                        <button class="btn btn-dark btn-sm w-100" onclick="send('Agregó: ${p.n}')">Agregar al carrito</button>
                    </div>
                </div>
            </div>`;
        });

        // 3. Lógica visual del carrito (Solo para que se vea que funciona)
        let cart = [];
        function add(n, p) { 
            cart.push({n,p}); 
            ui(); 
        }
        
        function ui() {
            const list = document.getElementById('list');
            document.getElementById('cart-badge').innerText = cart.length;
            list.innerHTML = ''; 
            let s = 0;
            cart.forEach(p => { 
                s += p.p; 
                list.innerHTML += `<div class="cart-item"><b>${p.n}</b> - $${p.p.toLocaleString()}</div>`; 
            });
            document.getElementById('total').innerText = '$' + s.toLocaleString();
        }

        // ==========================================
        // 4. TELEMETRÍA PARA TU BACKEND (RENDER + MONGODB)
        // ==========================================
        
        // Rastreamos clics generales en la página
        document.addEventListener('click', (e) => {
            let texto = e.target.innerText;
            // Solo mandamos si le picaron a algo con texto (botones, títulos)
            if (texto) {
                send(texto.substring(0, 30)); 
            }
        });

        // Función que manda los datos a tu API en Render
        function send(elemento) {
            fetch('https://telemetria-tese.onrender.com/recibir-clic', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    x: 0, 
                    y: 0, 
                    pagina: "Tienda-Master-Jose", // Esta etiqueta la lee tu Dashboard
                    elemento_clic: elemento 
                })
            }).catch(() => {
                // Si falla el internet, no le mostramos error al usuario
                console.log("Error de conexión con el servidor de telemetría.");
            });
        }
    </script>
</body>
</html>
