<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda TESE - Proyecto Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        .bg-tese { background-color: #1c2127 !important; }
        .card-img-top { height: 180px; object-fit: cover; background: #eee; }
        .cart-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wbei7avd12");
    </script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-tese sticky-top shadow"><div class="container">
        <span class="navbar-brand fw-bold">🛒 TIENDA TESE</span>
        <button class="btn btn-warning fw-bold" data-bs-toggle="offcanvas" data-bs-target="#cartSide">
            <i class="bi-cart-fill"></i> <span id="cart-badge" class="badge bg-danger rounded-pill">0</span>
        </button>
    </div></nav>

    <div class="container py-4 text-center">
        <h2 class="fw-bold">Ingeniería en Sistemas Computacionales</h2>
        <p class="text-muted small">Telemetría de Ventas - Equipo TESE 2026</p>
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-4" id="grid"></div>
    </div>

    <div class="offcanvas offcanvas-end" id="cartSide">
        <div class="offcanvas-header bg-dark text-white"><h5 class="m-0">Tu Carrito</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body">
            <div id="list"></div><hr>
            <div class="d-flex justify-content-between mb-3"><h5>Total:</h5><h5 id="total">$0</h5></div>
            <button class="btn btn-success w-100 fw-bold" onclick="pagar()">PAGAR AHORA</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Cambiamos la URL de la webcam por una imagen de un sensor/cámara genérica estable
        const products = [
            {n:"Laptop Gamer Pro", p:24500, i:"https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400"},
            {n:"Audífonos Bluetooth", p:3200, i:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
            {n:"Mouse Inalámbrico", p:850, i:"https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400"},
            {n:"Teclado RGB", p:1800, i:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400"},
            {n:"Cámara de Seguridad", p:1100, i:"https://images.unsplash.com/photo-1557862921-37829c790f19?w=400"},
            {n:"Lámpara LED", p:780, i:"https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=400"}
        ];

        const gal = document.getElementById('grid');
        products.forEach(p => {
            gal.innerHTML += `<div class="col"><div class="card h-100 shadow-sm border-0">
                <img src="${p.i}" class="card-img-top">
                <div class="card-body"><h6>${p.n}</h6><p class="text-primary fw-bold">$${p.p.toLocaleString()}</p>
                <button class="btn btn-dark btn-sm w-100" onclick="add('${p.n}', ${p.p})">Agregar</button></div>
            </div></div>`;
        });

        let cart = [];
        function add(n, p) { cart.push({n,p}); ui(); send('Agregó: ' + n); }
        function remove(index, n) { cart.splice(index, 1); ui(); send('Eliminó: ' + n); }
        function pagar() { 
            if(cart.length === 0) return alert("Carrito vacío");
            send('Clic Pagar - Total: ' + document.getElementById('total').innerText);
            alert("Procesando pago... (Evento de telemetría enviado)");
        }

        function ui() {
            const list = document.getElementById('list');
            document.getElementById('cart-badge').innerText = cart.length;
            list.innerHTML = ''; let s = 0;
            cart.forEach((p, i) => { s+=p.p; list.innerHTML += `
                <div class="cart-item"><span><b>${p.n}</b> - $${p.p}</span>
                <button class="btn btn-sm btn-outline-danger" onclick="remove(${i}, '${p.n}')"><i class="bi-trash"></i></button></div>`; 
            });
            document.getElementById('total').innerText = '$' + s.toLocaleString();
        }

        function send(elemento) {
            fetch('https://telemetria-tese.onrender.com/recibir-clic', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ x: 0, y: 0, pagina: "Tienda-Master-Jose", elemento_clic: elemento })
            }).catch(() => {});
        }
    </script>
</body>
</html>
